<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Blueprint frame diagram">
  <!-- transparent background so it adapts to the surrounding surface (light/dark) -->

  <!-- faint background grid -->
  <g stroke="#808080" stroke-width="1" opacity="0.18">
    <path d="M0 60H1600M0 120H1600M0 180H1600M0 240H1600M0 300H1600M0 360H1600M0 420H1600M0 480H1600M0 540H1600M0 600H1600M0 660H1600M0 720H1600M0 780H1600M0 840H1600"/>
    <path d="M60 0V900M120 0V900M180 0V900M240 0V900M300 0V900M360 0V900M420 0V900M480 0V900M540 0V900M600 0V900M660 0V900M720 0V900M780 0V900M840 0V900M900 0V900M960 0V900M1020 0V900M1080 0V900M1140 0V900M1200 0V900M1260 0V900M1320 0V900M1380 0V900M1440 0V900M1500 0V900M1560 0V900"/>
  </g>

  <!-- vertical rails -->
  <g stroke="#808080" stroke-width="1.5" opacity="0.45">
    <path d="M400 0V900"/>
    <path d="M1200 0V900"/>
    <path d="M0 450H1600"/>
  </g>

  <!-- centered frame -->
  <rect x="620" y="320" width="360" height="260" fill="none" stroke="#808080" stroke-width="2" opacity="0.7"/>

  <!-- crosshairs at rail x divider intersections -->
  <g stroke="#808080" stroke-width="2" opacity="0.8">
    <path d="M386 450H414M400 436V464"/>
    <path d="M1186 450H1214M1200 436V464"/>
    <path d="M606 320H634M620 306V334"/>
    <path d="M966 320H994M980 306V334"/>
    <path d="M606 580H634M620 566V594"/>
    <path d="M966 580H994M980 566V594"/>
  </g>

  <text x="640" y="468" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#808080" opacity="0.8" letter-spacing="2">FRAME</text>
</svg>
